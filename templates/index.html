<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Spam Detector</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(135deg,#5774f5,#d63c8b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background: transparent;
    padding:40px;
    width:450px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0, 0, 0, 0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border-radius:8px;
    border:1px solid #1d1b1c;
    resize:none;
    font-size:15px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0086e6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5563d1;
}

.result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Email Spam Checker</h1>

<textarea style="background-color: rgba(244, 244, 244, 0.8);" id="message" placeholder="Enter email message here..."></textarea>

<button onclick="checkSpam()">Check Message</button>

<div class="result" id="result"></div>

</div>

<script>

function checkSpam(){

let message = document.getElementById("message").value

fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})

.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerHTML =
"Prediction : " + data.result
})

}

</script>

</body>
</html>
